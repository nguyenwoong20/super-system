# ============================================================
# Nginx API Gateway Configuration
# File: infra/nginx/nginx.conf
# ============================================================
# Role: Internal Load Balancer & URL Router
#   - Receives traffic from AWS ALB
#   - Routes /api/auth/** → auth-service
#   - Routes /api/tickets/** → ticket-service
#   - Health check endpoint for ALB target group
# ============================================================

# ── Worker Configuration ───────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basic Settings ────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging Format ────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance Settings ──────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # ── Gzip Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               application/xml+rss text/javascript;

    # ── Security Headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    # ── Rate Limiting Zones ───────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;

    # ── Upstream: Auth Service ────────────────────────────
    # AWS Service Discovery resolves auth-service to Fargate task IPs
    upstream auth_service {
        least_conn;
        server auth-service.super-system.local:3001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Upstream: Ticket Service ──────────────────────────
    upstream ticket_service {
        least_conn;
        server ticket-service.super-system.local:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Main Server Block ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Health Check (for ALB Target Group) ──────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Auth Service Routes ───────────────────────────
        # Handles: /api/auth/login, /api/auth/register, /api/auth/refresh
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass         http://auth_service/auth/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Retry on error
            proxy_next_upstream error timeout http_500 http_502 http_503;
        }

        # ── Ticket Service Routes ─────────────────────────
        # Handles: /api/tickets/*, /api/bookings/*, /api/events/*
        location /api/tickets/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass         http://ticket_service/tickets/;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            proxy_next_upstream error timeout http_500 http_502 http_503;
        }

        # ── 404 Catch-all ─────────────────────────────────
        location / {
            default_type application/json;
            return 404 '{"error":"Route not found","code":404}';
        }

        # ── Error Pages ───────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable","code":503}';
        }
    }
}
